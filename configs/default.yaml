project:
  name: V2_scene_rep
  seed: 42
  device: auto

smarts:
  scenario_path: scenarios/sumo/loop
  headless: true
  envision: false
  timestep_sec: 0.1
  max_episode_steps: 1000

observation:
  history_len: 8
  max_neighbors: 8
  neighbor_radius_m: 60.0
  max_candidate_routes: 4
  waypoint_len: 20
  waypoint_spacing_m: 2.0

action:
  max_speed_mps: 15.0
  lane_change_bins:
    left: [-1.0, -0.333333]
    keep: [-0.333333, 0.333333]
    right: [0.333333, 1.0]

reward:
  success_reward: 1.0
  collision_penalty: -1.0
  off_route_penalty: -1.0
  step_penalty: 0.0

model:
  motion_dim: 5
  waypoint_dim: 3
  d_model: 128
  nhead: 4
  num_layers: 1
  latent_dim: 128
  dropout: 0.1

sac:
  gamma: 0.99
  tau: 0.005
  actor_lr: 0.0001
  critic_lr: 0.0001
  alpha_lr: 0.0001
  batch_size: 128
  replay_size: 200000
  warmup_steps: 1000
  updates_per_step: 1
  target_entropy: -2.0

slt:
  enabled: true
  future_horizon: 5
  lr: 0.0001
  loss_weight: 1.0
  projector_dim: 128
  predictor_dim: 128

training:
  total_steps: 100000
  eval_every_steps: 5000
  save_every_steps: 10000
  log_every_steps: 500
  checkpoint_dir: checkpoints